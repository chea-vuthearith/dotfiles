##! Utilities
# Screenshot, Record, OCR, Color picker, Clipboard history
bind = Super, V, exec, uwsm-app -- sh -c 'pkill fuzzel || cliphist list | fuzzel --match-mode fzf --dmenu | cliphist decode | wl-copy'
bind = Super, Period, exec, uwsm-app -- sh -c 'pkill fuzzel || ~/dotfiles/scripts/fuzzel-emoji'
bind = Ctrl+Shift+Alt, Delete, exec, uwsm-app -- sh -c 'pkill wlogout || wlogout -p layer-shell'
bind = Super+Shift, S, exec, uwsm-app -- ~/dotfiles/scripts/grimblast.sh --freeze copy area
bind = Super+Shift+Alt, S, exec, uwsm-app -- sh -c 'grim -g "$(slurp)" - | swappy -f -'

# OCR
bind = Super+Shift,T,exec, uwsm-app -- sh -c 'grim -g "$(slurp $SLURP_ARGS)" tmp.png && tesseract -l eng tmp.png - | wl-copy && rm tmp.png'
bind = Ctrl+Super+Shift,S,exec, uwsm-app -- sh -c 'grim -g "$(slurp $SLURP_ARGS)" tmp.png && tesseract tmp.png - | wl-copy && rm tmp.png'

# Color picker
bind = Super+Shift, C, exec, uwsm-app -- hyprpicker -a

# Fullscreen screenshot
bindl = ,Print, exec, uwsm-app -- sh -c 'grim - | wl-copy'
bindl = Ctrl,Print, exec, uwsm-app -- sh -c 'mkdir -p ~/Pictures/Screenshots && ~/dotfiles/scripts/grimblast.sh copysave screen ~/Pictures/Screenshots/Screenshot_"$(date "+%Y-%m-%d_%H.%M.%S")".png'

# Recording stuff
bind = Super+Shift, R, exec, uwsm-app -- ~/dotfiles/scripts/record-script.sh
bind = Ctrl+Alt, R, exec, uwsm-app -- ~/dotfiles/scripts/record-script.sh --fullscreen
bind = Super+Shift+Alt, R, exec, uwsm-app -- ~/dotfiles/scripts/record-script.sh --fullscreen-sound


##! Workspace
# navigation
bind = Super, 1, split-workspace, 1
bind = Super, 2, split-workspace, 2
bind = Super, 3, split-workspace, 3
bind = Super, 4, split-workspace, 4
bind = Super, 5, split-workspace, 5
bind = Super, 6, split-workspace, 6
bind = Super, 7, split-workspace, 7
bind = Super, 8, split-workspace, 8
bind = Super, 9, split-workspace, 9
bind = Super, 0, split-workspace, 10

# management
bind = Super+Shift, 1, split-movetoworkspace, 1
bind = Super+Shift, 2, split-movetoworkspace, 2
bind = Super+Shift, 3, split-movetoworkspace, 3
bind = Super+Shift, 4, split-movetoworkspace, 4
bind = Super+Shift, 5, split-movetoworkspace, 5
bind = Super+Shift, 6, split-movetoworkspace, 6
bind = Super+Shift, 7, split-movetoworkspace, 7
bind = Super+Shift, 8, split-movetoworkspace, 8
bind = Super+Shift, 9, split-movetoworkspace, 9
bind = Super+Shift, 0, split-movetoworkspace, 10

##! Media
bindl = Super+Shift, N, exec, uwsm-app -- sh -c 'playerctl next || playerctl position $(bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100")'
bindl = Super+Shift, P, exec, uwsm-app -- playerctl previous
bindl = Super+Shift, K, exec, uwsm-app -- playerctl play-pause


##! System Controls
bindl = ,XF86AudioPrev, exec, uwsm-app -- playerctl previous
bindl = ,XF86AudioNext, exec, uwsm-app -- sh -c 'playerctl next || playerctl position $(bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100")'
bindl = ,XF86AudioMicMute, exec, uwsm-app -- wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl = ,XF86AudioMute, exec, uwsm-app -- wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = ,XF86AudioRaiseVolume, exec, uwsm-app -- wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindle = ,XF86AudioLowerVolume, exec, uwsm-app -- wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindle = ,XF86MonBrightnessUp, exec, uwsm-app -- brightnessctl set '5%+'
bindle = ,XF86MonBrightnessDown, exec, uwsm-app -- brightnessctl set '5%-'
bindle = Shift, XF86MonBrightnessUp, exec, uwsm-app -- brightnessctl set '1%+'
bindle = Shift, XF86MonBrightnessDown, exec, uwsm-app -- brightnessctl set '1%-'
bind = ,XF86Poweroff, exec, uwsm-app -- wlogout
bindl = ,XF86AudioPlay, exec, uwsm-app -- playerctl play-pause
bindl = ,XF86AudioPause, exec, uwsm-app -- playerctl play-pause

# Monitor control
binds = Super_L, m&1, exec, uwsm-app -- hyprctl dispatch dpms toggle DP-1
binds = Super_L, m&2, exec, uwsm-app -- hyprctl dispatch dpms toggle DP-3
bind = Super+Shift, m, exec, uwsm-app -- hyprctl dispatch dpms toggle


##! Apps
bind = Super, A, exec, uwsm-app -- hyprpanel t notificationsmenu
bind = Super, D, exec, uwsm-app -- hyprpanel cno
bind = Super, E, exec, uwsm-app -- wezterm start --always-new-process yazi
bind = Super, Escape, exec, uwsm-app -- sh -c 'hyprpanel t bar-0; hyprpanel t bar-1'
bind = Ctrl+Super, V, exec, uwsm-app -- pavucontrol
bind = Super, Space, exec, uwsm-app -- sh -c 'fuzzel --keyboard-focus=on-demand || pkill fuzzel'
bind = Super, B, exec, uwsm-app -- brave --hide-crash-restore-bubble --test-type -enable-features=UseOzonePlatform --ozone-platform=wayland
bind = Super, Return, exec, uwsm-app -- wezterm

##! Layout
bind = Super, Q, killactive,
bind = Super, F, fullscreen, 0
bind = Super, T, togglefloating
bind = Super, P, pseudo,
bind = Super, S, togglesplit,

bind = Super, h, movefocus, l
bind = Super, l, movefocus, r
bind = Super, k, movefocus, u
bind = Super, j, movefocus, d

# Resize windows
binde = Super, Left, resizeactive, -100 0
binde = Super, Right, resizeactive, 100 0
binde = Super, Up, resizeactive, 0 -100
binde = Super, Down, resizeactive, 0 100

# Reposition Windows
bind = Super+Shift, H, movewindow, l
bind = Super+Shift, L, movewindow, r
bind = Super+Shift, K, movewindow, u
bind = Super+Shift, J, movewindow, d

bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow

##! Testing
bind = Super+Alt, f12, exec, uwsm-app -- notify-send 'Test notification' "Here's a really long message to test truncation and wrapping
You can middle click or flick this notification to dismiss it!" -a 'Shell' -A "Test1=I got it!" -A "Test2=Another action" -t 5000
bind = Super+Alt, Equal, exec, uwsm-app -- notify-send "Urgent notification" "Ah hell no" -u critical -a 'Hyprland keybind'

