# ######## Window rules ########

# General rule – disable blur for all windows.
# (Using "class:.*" as a catch-all field since at least one field is required)
# windowrulev2 = noblur, class:.*

# Uncomment to apply global transparency to all windows:
# windowrulev2 = opacity 0.89 override 0.89 override, class:.*

# Specific floating windows.
windowrulev2 = float, class:^(blueberry\.py)$
windowrulev2 = float, class:^(guifetch)$   # FlafyDev/guifetch

# Tiling rule for a specific app.
windowrulev2 = tile, class:^dev\.warp\.Warp$

# Picture-in-Picture window (matched by title).
windowrulev2 = float, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$

# Dialog windows – float+center these windows.
windowrulev2 = center, title:^(Open File)(.*)$
windowrulev2 = center, title:^(Select a File)(.*)$
windowrulev2 = center, title:^(Choose wallpaper)(.*)$
windowrulev2 = center, title:^(Open Folder)(.*)$
windowrulev2 = center, title:^(Save As)(.*)$
windowrulev2 = center, title:^(Library)(.*)$
windowrulev2 = center, title:^(File Upload)(.*)$
windowrulev2 = float, title:^(Open File)(.*)$
windowrulev2 = float, title:^(Select a File)(.*)$
windowrulev2 = float, title:^(Choose wallpaper)(.*)$
windowrulev2 = float, title:^(Open Folder)(.*)$
windowrulev2 = float, title:^(Save As)(.*)$
windowrulev2 = float, title:^(Library)(.*)$
windowrulev2 = float, title:^(File Upload)(.*)$

# --- Picture-in-Picture enhancements ---
windowrulev2 = keepaspectratio, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = move 73% 72%, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$ 
windowrulev2 = size 25%, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = float, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = pin, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$

# --- Tearing ---
windowrulev2 = immediate, title:.*\.exe
windowrulev2 = immediate, class:^(steam_app)(.*)
windowrulev2 = tile, initialClass:^(steam_app)(.*)

# No shadow for tiled windows (matches windows that are not floating).
windowrulev2 = noshadow, floating:0

# ######## Layer rules ########
layerrule = xray 1, match:class .*
# layerrule = noanim, .*
layerrule = no_anim on, match:class walker
layerrule = no_anim on, match:class selection
layerrule = no_anim on, match:class overview
layerrule = no_anim on, match:class anyrun
layerrule = no_anim on, match:class indicator.*
layerrule = no_anim on, match:class osk
layerrule = no_anim on, match:class hyprpicker
layerrule = blur on, match:class shell:*
layerrule = ignore_alpha 0.6, match:class shell:*

layerrule = no_anim on, match:class noanim
layerrule = blur on, match:class gtk-layer-shell
layerrule = ignore_alpha 0, match:class gtk-layer-shell
layerrule = blur on, match:class launcher
layerrule = ignore_alpha 0.5, match:class launcher
layerrule = blur on, match:class notifications
layerrule = ignore_alpha 0.69, match:class notifications
layerrule = blur on, match:class logout_dialog # wlogout


windowrulev2 = opacity 2, floating:1

# smart gaps
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]
