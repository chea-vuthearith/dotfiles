##! Utilities
# Screenshot, Record, OCR, Color picker, Clipboard history
bind = Super, V, exec, caelestia shell clipboard toggle
bind = Super, Period, exec, caelestia shell emoji toggle
bind = Super+Shift, S, global, caelestia:screenshotFreezeClip
bind = Super+Shift+Alt, S, global, caelestia:screenshotFreeze

# OCR
bind = Super+Shift,T,exec,grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract -l eng "tmp.png" - | wl-copy && rm "tmp.png"
bind = Ctrl+Super+Shift,S,exec,grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract "tmp.png" - | wl-copy && rm "tmp.png"

# Color picker
bind = Super+Shift, C, exec, hyprpicker -a

# Recording stuff
bind = Super+Shift+Alt, R, exec, caelestia record -s -c  # Record screen with sound
bind = Ctrl+Alt, R, exec, caelestia record -c  # Record screen
bind = Super+Shift, R, exec, caelestia record -r -c  # Record region

##! Workspace
# navigation
bind = Super, 1, split:workspace, 1
bind = Super, 2, split:workspace, 2
bind = Super, 3, split:workspace, 3
bind = Super, 4, split:workspace, 4
bind = Super, 5, split:workspace, 5
bind = Super, 6, split:workspace, 6
bind = Super, 7, split:workspace, 7
bind = Super, 8, split:workspace, 8
bind = Super, 9, split:workspace, 9
bind = Super, 0, split:workspace, 10

# management
bind = Super+Shift, 1, split:movetoworkspace, 1
bind = Super+Shift, 2, split:movetoworkspace, 2
bind = Super+Shift, 3, split:movetoworkspace, 3
bind = Super+Shift, 4, split:movetoworkspace, 4
bind = Super+Shift, 5, split:movetoworkspace, 5
bind = Super+Shift, 6, split:movetoworkspace, 6
bind = Super+Shift, 7, split:movetoworkspace, 7
bind = Super+Shift, 8, split:movetoworkspace, 8
bind = Super+Shift, 9, split:movetoworkspace, 9

# overview
bindu = Super+Ctrl, H, hyprtasking:move, left
bindu = Super+Ctrl, J, hyprtasking:move, down
bindu = Super+Ctrl, K, hyprtasking:move, up
bindu = Super+Ctrl, L, hyprtasking:move, right
bindu = Super+Ctrl+Shift, H, hyprtasking:movewindow, left
bindu = Super+Ctrl+Shift, J, hyprtasking:movewindow, down
bindu = Super+Ctrl+Shift, K, hyprtasking:movewindow, up
bindu = Super+Ctrl+Shift, L, hyprtasking:movewindow, right

bindu = Super, tab, exec, hyprctl dispatch hyprtasking:if_not_active submap overview; hyprctl dispatch hyprtasking:if_active submap reset; hyprctl dispatch hyprtasking:toggle all
submap = overview # so that they dont conflict with other keybinds
bind = , H, hyprtasking:move, left
bind = , J, hyprtasking:move, down
bind = , K, hyprtasking:move, up
bind = , L, hyprtasking:move, right
bind = Shift, H, hyprtasking:movewindow, left
bind = Shift, J, hyprtasking:movewindow, down
bind = Shift, K, hyprtasking:movewindow, up
bind = Shift, L, hyprtasking:movewindow, right
bind = Super, Q, killactive,
bind = , Escape, exec, hyprctl dispatch hyprtasking:if_not_active submap overview; hyprctl dispatch hyprtasking:if_active submap reset; hyprctl dispatch hyprtasking:toggle all
bind = , Return, exec, hyprctl dispatch hyprtasking:if_not_active submap overview; hyprctl dispatch hyprtasking:if_active submap reset; hyprctl dispatch hyprtasking:toggle all
submap = reset

binde = Super, z, plugin:dynamic-cursors:magnify 


##! System Controls
bindl =, XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1  @DEFAULT_AUDIO_SINK@ 10%+
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindle=, XF86MonBrightnessUp, global, caelestia:brightnessUp
bindle=, XF86MonBrightnessDown, global, caelestia:brightnessDown
bindle= Shift, XF86MonBrightnessUp, exec, caelestia shell brightness set '+1%'
bindle= Shift, XF86MonBrightnessDown, exec, caelestia shell brightness set '1%-'
bind = ,XF86Poweroff, exec, wlogout
bindl= ,XF86AudioPlay, exec, playerctl caelestia:mediaToggle
bindl= ,XF86AudioPause, exec, playerctl caelestia:mediaToggle

# Monitor control
bind = Super, m, submap, DPMS
submap = DPMS # so that they dont conflict with other keybinds
bindst = Super_L, m&1, exec, hyprctl dispatch dpms toggle DP-1; hyprctl dispatch submap reset
bindst = Super_L, m&2, exec, hyprctl dispatch dpms toggle DP-3; hyprctl dispatch submap reset
submap = reset

bind = Super+Shift, m, exec, hyprctl dispatch dpms toggle

##! Apps
bind = Super, A, exec, caelestia shell drawers toggle sidebar
bind = Super, D, global, caelestia:clearNotifs
bind = Super, E, exec, ghostty -e yazi
bind = Super, Escape, exec, caelestia shell drawers toggle bar
bind = Ctrl+Super, V, exec, pavucontrol
bind = Super, Space, global, caelestia:launcher
bind = Super, B, exec, brave --profile-directory="Default"
bind = Super+Shift, B, exec, brave --profile-directory="Profile 1"
bind = Super, Return, exec, ghostty 

##! Layout
bind = Super, Q, killactive,
# bind = Super, F, fullscreen, 1
bind = Super, F, layoutmsg, fit active
bind = Super+Shift, F, fullscreen, 0
bind = Super, T, togglefloating
bind = Super, P, pseudo,
bind = Super, S, layoutmsg, togglesplit

bind = Super, h, movefocus, l
bind = Super, l, movefocus, r
bind = Super, k, movefocus, u
bind = Super, j, movefocus, d

# Resize windows
binde = Super, Left, layoutmsg, colresize -0.25
binde = Super, Right,layoutmsg, colresize +0.25
binde = Super, Up, resizeactive, 0 -100
binde = Super, Down, resizeactive, 0 100

# Reposition Windows
bind = Super+Shift, H, layoutmsg, swapcol l
bind = Super+Shift, L, layoutmsg, swapcol r
bind = Super+Shift, K, movewindow, u
bind = Super+Shift, J, movewindow, d

bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow

# Testing
bind = Super+Alt, f12, exec, notify-send 'Test notification' "Here's a really long message to test truncation and wrapping\nYou can middle click or flick this notification to dismiss it!" -a 'Shell' -A "Test1=I got it!" -A "Test2=Another action" -t 5000
bind = Super+Alt, Equal, exec, notify-send "Urgent notification" "Ah hell no" -u critical -a 'Hyprland keybind'

##! Media
bindl = Ctrl+Super, N, global, caelestia:mediaNext
bindl = Ctrl+Super, P, global, caelestia:mediaPrev
bindl = Ctrl+Super, Space, global, caelestia:mediaToggle
