# ######## Window rules ########

# General rule – disable blur for all windows.
# (Using "class:.*" as a catch-all field since at least one field is required)
# windowrule = match:class .*, no_blur on

# Uncomment to apply global transparency to all windows:
# windowrule = match:class .*, opacity 0.89 0.89


# Tiling rule for a specific app.
windowrule = match:class ^(dev\.warp\.Warp)$, tile on

# Picture-in-Picture window (matched by title).
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float on

# Dialog windows – float+center these windows.
windowrule = match:title ^(Open File)(.*)$, center on
windowrule = match:title ^(Select a File)(.*)$, center on
windowrule = match:title ^(Choose wallpaper)(.*)$, center on
windowrule = match:title ^(Open Folder)(.*)$, center on
windowrule = match:title ^(Save As)(.*)$, center on
windowrule = match:title ^(Library)(.*)$, center on
windowrule = match:title ^(File Upload)(.*)$, center on
windowrule = match:title ^(Open File)(.*)$, float on
windowrule = match:title ^(Select a File)(.*)$, float on
windowrule = match:title ^(Choose wallpaper)(.*)$, float on
windowrule = match:title ^(Open Folder)(.*)$, float on
windowrule = match:title ^(Save As)(.*)$, float on
windowrule = match:title ^(Library)(.*)$, float on
windowrule = match:title ^(File Upload)(.*)$, float on

# --- Picture-in-Picture enhancements ---
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, keep_aspect_ratio on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, move 73% 72%
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, size 25% 25%
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, pin on

# --- Tearing ---
windowrule = match:title .*\.exe, immediate on
windowrule = match:class ^(steam_app)(.*)$, immediate on
windowrule = match:initial_class ^(steam_app)(.*)$, tile on

# No shadow for tiled windows (matches windows that are not floating).
windowrule = match:float 0, no_shadow on

# ######## Layer rules ########
layerrule = no_anim on, match:class walker
layerrule = no_anim on, match:class selection
layerrule = no_anim on, match:class overview
layerrule = no_anim on, match:class anyrun
layerrule = no_anim on, match:class indicator.*
layerrule = no_anim on, match:class osk
layerrule = no_anim on, match:class hyprpicker
layerrule = blur on, match:class shell:*
layerrule = ignore_alpha 0.6, match:class shell:*

layerrule = no_anim on, match:class noanim
layerrule = blur on, match:class gtk-layer-shell
layerrule = ignore_alpha 0, match:class gtk-layer-shell
layerrule = blur on, match:class launcher
layerrule = ignore_alpha 0.5, match:class launcher
layerrule = blur on, match:class notifications
layerrule = ignore_alpha 0.69, match:class notifications
layerrule = blur on, match:class logout_dialog # wlogout


windowrule = match:float 1, opacity 2


# workspaces mapping
windowrule {
  name = "no-screen-share"
  match:class = .*(telegram|discord|slack|element|mattermost-desktop).*
  no_screen_share = on
}

render {
  cm_enabled = false
}
