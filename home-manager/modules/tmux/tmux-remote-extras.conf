bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tmux save-buffer - | base64 | awk '{printf \"\033Ptmux;\033\033]52;c;%s\007\033\\\\\", \$0}'"

# update ssh_auth_sock to use stable symlink created by the sst command
set-environment -g SSH_AUTH_SOCK $HOME/.ssh/ssh_auth_sock
