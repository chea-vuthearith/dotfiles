name: ginav2
root: ~/code/work/groundup/GinaV2

pre_window: set -a; . ./.env; set +a;

on_project_stop: >
  docker compose -f docker-compose.data.yml -f docker-compose.auth.yml -f docker-compose.app.yml -f docker-compose.dev.yml --profile "*" down

windows:
  - frontend:
      panes:
        - nvim Frontend/src/App.tsx

  - backend:
      panes:
        - nvim Backend/API/src/main.py

  - dev-server:
      panes:
        - sst GroundupDev

  - services:
      layout: even-horizontal
      panes:
        -
        - |
          ssh -fN $(for var in API_PORT AUTHENTIK_HTTP_PORT; do
            port="${!var}"
            printf -- "-L %s:localhost:%s " "$port" "$port"
          done) GroundupOffice

          docker compose \
            -f docker-compose.app.yml \
            -f docker-compose.dev.yml \
            up api frontend-client frontend-owner --build -w \
            >/dev/null 2>&1 &

          lazydocker \
            -f docker-compose.data.yml \
            -f docker-compose.auth.yml \
            -f docker-compose.app.yml \
            -f docker-compose.dev.yml
