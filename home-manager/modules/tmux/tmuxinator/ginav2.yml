name: ginav2
root: ~/code/work/groundup/GinaV2

pre_window: set -a; source .env; set +a;

on_project_stop: |
  docker compose \
    -f docker-compose.data.yml \
    -f docker-compose.auth.yml \
    -f docker-compose.app.yml \
    -f docker-compose.dev.yml \
    --profile "*" down

windows:
  - frontend:
      panes:
        - nvim Frontend/src/App.tsx

  - backend:
      panes:
        - nvim Backend/API/src/main.py

  - dev-server:
      panes:
        - sst GroundupDev

  - services:
      layout: even-horizontal
      panes:
        -
        - |
          set -a; source .env; set +a

          ssh -N \
            -L "${API_PORT}:localhost:${API_PORT}" \
            -L "${AUTHENTIK_HTTP_PORT}:localhost:${AUTHENTIK_HTTP_PORT}" \
            -L "${MINIO_PORT}:localhost:${MINIO_PORT}" \
            GroundupDev &

          docker compose \
            -f docker-compose.app.yml \
            -f docker-compose.dev.yml \
            up frontend-client frontend-owner --build -w \
            >/dev/null 2>&1 &

          lazydocker \
            -f docker-compose.data.yml \
            -f docker-compose.auth.yml \
            -f docker-compose.app.yml \
            -f docker-compose.dev.yml
