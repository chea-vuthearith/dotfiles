name: ginav2
root: ~/code/work/groundup/GinaV2

pre_window: set -a; . ./.env; set +a;

on_project_stop: >
  docker compose -f docker-compose.data.yml -f docker-compose.auth.yml -f docker-compose.app.yml -f docker-compose.dev.yml --profile "*" down

windows:
  - frontend:
      root: ~/code/work/groundup/GinaV2/Frontend
      panes:
        - nvim src/App.tsx

  - backend:
      root: ~/code/work/groundup/GinaV2/Backend
      panes:
        - nvim API/src/main.py

  - services:
      root: ~/code/work/groundup/GinaV2
      layout: even-horizontal
      panes:
        -
        - >
          docker compose -f docker-compose.data.yml -f docker-compose.auth.yml --profile local-psql --profile minio up -d --wait;
          docker compose -f docker-compose.app.yml -f docker-compose.dev.yml up api frontend-client frontend-owner --build -w &;
          lazydocker -f docker-compose.data.yml -f docker-compose.auth.yml -f docker-compose.app.yml -f docker-compose.dev.yml;

